<script>
let selected = null;

function criarGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 81; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    cell.onclick = () => selectCell(cell);

    grid.appendChild(cell);
  }
}

function selectCell(cell) {
  document.querySelectorAll(".cell").forEach(c => c.style.outline = "none");
  selected = cell;
  cell.style.outline = "2px solid #0a84ff";
}

function setNum(n) {
  if (selected) selected.innerText = n;
}

function novo() {
  document.querySelectorAll(".cell").forEach(c => c.innerText = "");
}

criarGrid();
</script>
