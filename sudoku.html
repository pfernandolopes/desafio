<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f2;
  text-align:center;
}
h1 { font-weight:300; }

.controls button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ddd;
}

.grid {
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:2px;
  max-width:350px;
  margin:20px auto;
}

.cell {
  width:100%;
  aspect-ratio:1;
  background:#fff;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
}

.cell input {
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:18px;
  background:transparent;
}

.footer {
  margin-top:15px;
}

.numbers button {
  margin:3px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ddd;
  width:35px;
}
</style>
</head>
<body>

<h1>Sudoku</h1>

<div class="controls">
  <button onclick="novo()">Fácil</button>
  <button onclick="novo()">Médio</button>
  <button onclick="novo()">Difícil</button>
</div>

<div id="grid" class="grid"></div>

<div class="footer">
  <div class="numbers">
    <button onclick="setNum(1)">1</button>
    <button onclick="setNum(2)">2</button>
    <button onclick="setNum(3)">3</button>
    <button onclick="setNum(4)">4</button>
    <button onclick="setNum(5)">5</button>
    <button onclick="setNum(6)">6</button>
    <button onclick="setNum(7)">7</button>
    <button onclick="setNum(8)">8</button>
    <button onclick="setNum(9)">9</button>
  </div>
</div>

<script>
let selected = null;

function criarGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 81; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    const input = document.createElement("input");
    input.maxLength = 1;

    input.onclick = () => selected = input;

    cell.appendChild(input);
    grid.appendChild(cell);
  }
}

function setNum(n) {
  if (selected) selected.value = n;
}

function novo() {
  document.querySelectorAll("input").forEach(i => i.value = "");
}

criarGrid();
</script>

</body>
</html>
